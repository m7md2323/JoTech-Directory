run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable-all: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: _templ\.go
      linters:
        - errcheck
        - govet
        - unused
        - staticcheck
